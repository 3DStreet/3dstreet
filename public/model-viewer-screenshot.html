<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Model thumbnail</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
      }
      model-viewer {
        width: 100%;
        height: 100%;
        background: transparent;
        --progress-bar-color: transparent;
      }
    </style>
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"
    ></script>
  </head>
  <body>
    <!-- Headless thumbnail capture. The parent (gallery upload pipeline)
         mounts this in a hidden iframe with ?src=<glb url>, waits for our
         postMessage, then uploads the resulting blob as the asset
         thumbnail. Same stabilisation pattern as @shopify/screenshot-glb:
         poster-dismissed → 3× rAF → modelViewer.toBlob(). -->
    <model-viewer
      id="mv"
      loading="eager"
      reveal="auto"
      interaction-prompt="none"
      disable-zoom
      disable-pan
      shadow-intensity="0"
    ></model-viewer>
    <script>
      const params = new URLSearchParams(location.search);
      const src = params.get('src');
      const width = parseInt(params.get('w') || '512', 10);
      const height = parseInt(params.get('h') || '512', 10);
      document.body.style.width = width + 'px';
      document.body.style.height = height + 'px';

      const mv = document.getElementById('mv');

      function post(msg) {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(msg, '*');
        }
      }

      function log(...args) {
        console.log('[screenshot-iframe]', ...args);
      }

      if (!src) {
        post({ type: '3dstreet:screenshot-error', error: 'no src' });
      } else {
        log('loading', src);
        mv.src = src;

        mv.addEventListener('error', (e) => {
          try {
            log('error', e, e && e.detail);
          } catch {
            // ignore
          }
          post({
            type: '3dstreet:screenshot-error',
            error: String((e && (e.detail?.sourceError || e.detail)) || 'model load failed')
          });
        });

        mv.addEventListener('load', () => log('load fired'), { once: true });

        mv.addEventListener(
          'poster-dismissed',
          () => {
            log('poster-dismissed, capturing…');
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                requestAnimationFrame(async () => {
                  try {
                    // model-viewer.toBlob reads the WebGL canvas directly.
                    // Capture as PNG (preserves alpha), then composite onto
                    // a white 2D canvas so the exported JPEG has a white
                    // background instead of black-from-dropped-alpha.
                    const png = await mv.toBlob({
                      idealAspect: true,
                      mimeType: 'image/png'
                    });
                    const img = new Image();
                    img.src = URL.createObjectURL(png);
                    await new Promise((resolve, reject) => {
                      img.onload = resolve;
                      img.onerror = reject;
                    });
                    URL.revokeObjectURL(img.src);

                    const canvas = document.createElement('canvas');
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);

                    const blob = await new Promise((resolve) =>
                      canvas.toBlob(resolve, 'image/jpeg', 0.85)
                    );
                    log('captured', blob.size, 'bytes');
                    post({ type: '3dstreet:screenshot-blob', blob });
                  } catch (err) {
                    log('toBlob failed', err);
                    post({
                      type: '3dstreet:screenshot-error',
                      error: String(err)
                    });
                  }
                });
              });
            });
          },
          { once: true }
        );
      }
    </script>
  </body>
</html>
