<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Splat Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #393939;
        color: #d1d5db;
        font-family: system-ui, sans-serif;
      }
      #canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #loader {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        pointer-events: none;
      }
      #loader .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.12);
        border-top-color: #8965ef;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 12px;
      }
      #loader .label {
        color: #d1d5db;
        font-size: 13px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #err {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 13px;
        color: #e0473d;
        text-align: center;
        padding: 0 16px;
      }
      /* "Drag to orbit" hint — mirrors model-viewer's interaction prompt: a
         subtle hand that swipes side to side, fading in after load and out on
         first interaction so the user knows this is an interactive 3D view. */
      #dragHint {
        position: absolute;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.5s ease;
      }
      #dragHint.visible {
        opacity: 0.65;
      }
      #dragHint svg {
        display: block;
        width: 40px;
        height: 40px;
        color: #fff;
        filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.55));
        animation: dragSwipe 1.8s ease-in-out infinite;
      }
      @keyframes dragSwipe {
        0%,
        100% {
          transform: translateX(-9px) rotate(-8deg);
        }
        50% {
          transform: translateX(9px) rotate(8deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #dragHint svg {
          animation: none;
        }
      }
    </style>
    <!-- Pinned to the versions bundled in the app (three 0.180.0, spark 2.1.0)
         so the standalone viewer behaves like the in-editor splat component.
         Hosted as its own document (like model-viewer.html) so its THREE copy
         doesn't collide with the editor's window.THREE set by A-Frame. -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
          "@sparkjsdev/spark": "https://cdn.jsdelivr.net/npm/@sparkjsdev/spark@2.1.0/dist/spark.module.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="loader">
      <div class="spinner"></div>
      <div class="label">Loading splat…</div>
    </div>
    <div id="err" hidden>Unable to load splat</div>
    <!-- Drag-to-orbit hint (hand icon, Material "pan_tool"), shown once the
         splat is framed and hidden on first interaction. -->
    <div id="dragHint" hidden aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path
          d="M23 5.5V20c0 2.2-1.8 4-4 4h-7.3c-1.08 0-2.1-.43-2.85-1.19L1 14.83s1.26-1.23 1.3-1.25c.22-.19.49-.29.79-.29.22 0 .42.06.6.16.04.01 4.31 2.46 4.31 2.46V4c0-.83.67-1.5 1.5-1.5S12 3.17 12 4v7h1V1.5c0-.83.67-1.5 1.5-1.5S16 .67 16 1.5V11h1V2.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5V11h1V5.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5z"
        />
      </svg>
    </div>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { SparkRenderer, SplatMesh } from '@sparkjsdev/spark';

      const params = new URLSearchParams(location.search);
      const src = params.get('src');
      const loader = document.getElementById('loader');
      const err = document.getElementById('err');
      const dragHint = document.getElementById('dragHint');

      function showDragHint() {
        if (!dragHint) return;
        dragHint.hidden = false;
        // Next frame so the opacity transition actually runs from 0.
        requestAnimationFrame(() => dragHint.classList.add('visible'));
        // Auto-retire after a while even if the user never interacts, so it
        // doesn't loop forever in an idle preview.
        setTimeout(hideDragHint, 6000);
      }
      function hideDragHint() {
        if (!dragHint || dragHint.hidden) return;
        dragHint.classList.remove('visible');
        setTimeout(() => {
          dragHint.hidden = true;
        }, 500);
      }

      function showError(message) {
        loader.hidden = true;
        err.textContent = message;
        err.hidden = false;
      }

      if (!src) {
        showError('No splat URL provided');
      } else {
        init(src).catch((e) => {
          console.error('[splat-viewer] failed', e);
          showError('Unable to load splat');
        });
      }

      async function init(url) {
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({
          canvas,
          antialias: true,
          // Needed so we can read the canvas back into a thumbnail JPEG after
          // the splat settles (see postThumbnail). Minor perf cost, fine for a
          // preview viewer.
          preserveDrawingBuffer: true
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x393939);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.01,
          1000
        );
        camera.position.set(0, 0, 3);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;

        // Spark needs a SparkRenderer in the scene to draw splats.
        const spark = new SparkRenderer({ renderer, enableLod: true });
        scene.add(spark);

        // Mirror the in-editor splat component: RAD files have pre-built LOD
        // and stream via byte-range requests (paged), so they draw progressively
        // and fast. Other formats use on-the-fly LOD (full download first).
        const isRad = new URL(url, location.href).pathname
          .toLowerCase()
          .endsWith('.rad');
        const splat = new SplatMesh({
          url,
          ...(isRad ? { paged: true } : { lod: true })
        });
        // Spark uses a different quaternion convention; rotate to match the
        // upright orientation used by the in-editor splat component.
        splat.quaternion.set(1, 0, 0, 0);
        scene.add(splat);

        // The auto-framed camera pose, snapshotted right after framing (before
        // any user interaction) so the thumbnail capture is always the clean
        // framed view regardless of how the user later orbits.
        let framedCamera = null;
        try {
          await splat.initialized;
          loader.hidden = true;
          frameObject(splat, camera, controls);
          framedCamera = camera.clone();
          // Splat is visible and interactive now — prompt the drag gesture,
          // and dismiss it the moment the user grabs the view.
          showDragHint();
          canvas.addEventListener('pointerdown', hideDragHint, { once: true });
        } catch (e) {
          console.error('[splat-viewer] splat init failed', e);
          showError('Unable to load splat');
          return;
        }

        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        renderer.setAnimationLoop(() => {
          controls.update();
          renderer.render(scene, camera);
        });

        // Best-effort thumbnail. Once the splat has had a moment to refine via
        // LOD, render the auto-framed pose into an OFFSCREEN target (so live
        // orbiting can't affect it) and hand the JPEG up to the parent (the
        // asset preview modal), which backfills it as the asset thumbnail if
        // missing. Reuses the already-loaded splat — no reload, just a second
        // camera + render target. Harmless when no parent is listening.
        // 3s gives paged RAD time to stream higher-detail LOD; the delay costs
        // nothing UX-wise now that capture is decoupled from the live view.
        setTimeout(captureFramedThumbnail, 3000);

        function captureFramedThumbnail() {
          if (!framedCamera) return;
          const size = 512;
          let rt = null;
          try {
            const cam = framedCamera.clone();
            cam.aspect = 1; // square thumbnail
            cam.updateProjectionMatrix();

            rt = new THREE.WebGLRenderTarget(size, size);
            const prevTarget = renderer.getRenderTarget();
            renderer.setRenderTarget(rt);
            renderer.clear();
            renderer.render(scene, cam);
            const buf = new Uint8Array(size * size * 4);
            renderer.readRenderTargetPixels(rt, 0, 0, size, size, buf);
            renderer.setRenderTarget(prevTarget);

            // readRenderTargetPixels returns bottom-up rows; flip into ImageData.
            const out = document.createElement('canvas');
            out.width = size;
            out.height = size;
            const ctx = out.getContext('2d');
            const img = ctx.createImageData(size, size);
            const rowBytes = size * 4;
            for (let y = 0; y < size; y++) {
              const srcOff = (size - 1 - y) * rowBytes;
              img.data.set(
                buf.subarray(srcOff, srcOff + rowBytes),
                y * rowBytes
              );
            }
            ctx.putImageData(img, 0, 0);
            out.toBlob(
              (blob) => {
                if (blob && window.parent && window.parent !== window) {
                  window.parent.postMessage(
                    { type: '3dstreet:splat-thumbnail', blob, src: url },
                    '*'
                  );
                }
              },
              'image/jpeg',
              0.82
            );
          } catch (e) {
            console.warn('[splat-viewer] thumbnail capture failed', e);
          } finally {
            if (rt) rt.dispose();
          }
        }
      }

      // Position the camera so the whole splat is in view and set the orbit
      // pivot to its center. Best-effort: falls back to the default camera if
      // the bounds can't be read.
      function frameObject(splat, camera, controls) {
        let box;
        try {
          box = splat.getBoundingBox(true);
        } catch (e) {
          return;
        }
        if (!box || box.isEmpty()) return;

        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        // Bounds are in local space; the mesh is rotated, so rotate the center.
        center.applyQuaternion(splat.quaternion);

        const radius = Math.max(size.x, size.y, size.z, 0.001) * 0.5;
        const fov = (camera.fov * Math.PI) / 180;
        const dist = (radius / Math.tan(fov / 2)) * 1.8;

        camera.position.copy(center).add(
          new THREE.Vector3(0, radius * 0.25, dist)
        );
        camera.near = Math.max(dist / 1000, 0.001);
        camera.far = dist * 1000;
        camera.updateProjectionMatrix();

        controls.target.copy(center);
        controls.update();
      }
    </script>
  </body>
</html>
