<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Splat Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #393939;
        color: #d1d5db;
        font-family: system-ui, sans-serif;
      }
      #canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #loader {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        pointer-events: none;
      }
      #loader .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.12);
        border-top-color: #8965ef;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 12px;
      }
      #loader .label {
        color: #d1d5db;
        font-size: 13px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #err {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 13px;
        color: #e0473d;
        text-align: center;
        padding: 0 16px;
      }
    </style>
    <!-- Pinned to the versions bundled in the app (three 0.180.0, spark 2.1.0)
         so the standalone viewer behaves like the in-editor splat component.
         Hosted as its own document (like model-viewer.html) so its THREE copy
         doesn't collide with the editor's window.THREE set by A-Frame. -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
          "@sparkjsdev/spark": "https://cdn.jsdelivr.net/npm/@sparkjsdev/spark@2.1.0/dist/spark.module.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="loader">
      <div class="spinner"></div>
      <div class="label">Loading splat…</div>
    </div>
    <div id="err" hidden>Unable to load splat</div>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { SparkRenderer, SplatMesh } from '@sparkjsdev/spark';

      const params = new URLSearchParams(location.search);
      const src = params.get('src');
      const loader = document.getElementById('loader');
      const err = document.getElementById('err');

      function showError(message) {
        loader.hidden = true;
        err.textContent = message;
        err.hidden = false;
      }

      if (!src) {
        showError('No splat URL provided');
      } else {
        init(src).catch((e) => {
          console.error('[splat-viewer] failed', e);
          showError('Unable to load splat');
        });
      }

      async function init(url) {
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({
          canvas,
          antialias: true,
          // Needed so we can read the canvas back into a thumbnail JPEG after
          // the splat settles (see postThumbnail). Minor perf cost, fine for a
          // preview viewer.
          preserveDrawingBuffer: true
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x393939);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.01,
          1000
        );
        camera.position.set(0, 0, 3);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;

        // Spark needs a SparkRenderer in the scene to draw splats.
        const spark = new SparkRenderer({ renderer, enableLod: true });
        scene.add(spark);

        const splat = new SplatMesh({ url, lod: true });
        // Spark uses a different quaternion convention; rotate to match the
        // upright orientation used by the in-editor splat component.
        splat.quaternion.set(1, 0, 0, 0);
        scene.add(splat);

        try {
          await splat.initialized;
          loader.hidden = true;
          frameObject(splat, camera, controls);
        } catch (e) {
          console.error('[splat-viewer] splat init failed', e);
          showError('Unable to load splat');
          return;
        }

        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        renderer.setAnimationLoop(() => {
          controls.update();
          renderer.render(scene, camera);
        });

        // Best-effort: once the splat has had a moment to refine via LOD, hand
        // a downscaled JPEG of the current view up to the parent (e.g. the asset
        // preview modal), which backfills it as the asset thumbnail if missing.
        // Harmless when no parent is listening (e.g. the generator preview).
        setTimeout(() => postThumbnail(canvas, url), 1500);
      }

      // Draw the WebGL canvas onto a small 2D canvas (≤512px, aspect-preserved)
      // and postMessage the resulting JPEG blob to the parent. `src` is echoed
      // so the parent can confirm the capture still matches what it's showing.
      function postThumbnail(sourceCanvas, src) {
        try {
          const maxDim = 512;
          const sw = sourceCanvas.width;
          const sh = sourceCanvas.height;
          if (!sw || !sh) return;
          const scale = Math.min(1, maxDim / Math.max(sw, sh));
          const tw = Math.max(1, Math.round(sw * scale));
          const th = Math.max(1, Math.round(sh * scale));
          const tmp = document.createElement('canvas');
          tmp.width = tw;
          tmp.height = th;
          tmp.getContext('2d').drawImage(sourceCanvas, 0, 0, tw, th);
          tmp.toBlob(
            (blob) => {
              if (blob && window.parent && window.parent !== window) {
                window.parent.postMessage(
                  { type: '3dstreet:splat-thumbnail', blob, src },
                  '*'
                );
              }
            },
            'image/jpeg',
            0.82
          );
        } catch (e) {
          console.warn('[splat-viewer] thumbnail capture failed', e);
        }
      }

      // Position the camera so the whole splat is in view and set the orbit
      // pivot to its center. Best-effort: falls back to the default camera if
      // the bounds can't be read.
      function frameObject(splat, camera, controls) {
        let box;
        try {
          box = splat.getBoundingBox(true);
        } catch (e) {
          return;
        }
        if (!box || box.isEmpty()) return;

        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        // Bounds are in local space; the mesh is rotated, so rotate the center.
        center.applyQuaternion(splat.quaternion);

        const radius = Math.max(size.x, size.y, size.z, 0.001) * 0.5;
        const fov = (camera.fov * Math.PI) / 180;
        const dist = (radius / Math.tan(fov / 2)) * 1.8;

        camera.position.copy(center).add(
          new THREE.Vector3(0, radius * 0.25, dist)
        );
        camera.near = Math.max(dist / 1000, 0.001);
        camera.far = dist * 1000;
        camera.updateProjectionMatrix();

        controls.target.copy(center);
        controls.update();
      }
    </script>
  </body>
</html>
