<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bollard Buddy Web</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* App Switcher in upper-left. z-index sits above the 8th Wall landing page
       (shown to desktop visitors) so the logo stays visible and clickable there
       for the About blurb and app switcher, even while the QR fallback shows. */
    #app-switcher-root {
      position: fixed;
      top: 8px;
      left: 6px;
      z-index: 10000;
    }

    /* The Radix dropdown renders in a body-level portal; keep it above the
       landing page too so the menu is usable on desktop. */
    [data-radix-popper-content-wrapper] {
      z-index: 10001 !important;
    }

    /* Beta pill tucked under the app switcher logo. Sits above the landing
       page but below the iOS CTA so the CTA is never clipped by it. */
    #beta-pill {
      position: fixed;
      top: 66px;
      left: 16px;
      z-index: 9999;
      padding: 3px 8px;
      background: #774dee;
      border-radius: 6px;
      color: white;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      pointer-events: none;
    }

    /* iOS app CTA pill (shown on iPhone/iPad only). This is the primary
       nudge toward the native app, so it is deliberately large and prominent. */
    #ios-cta {
      position: fixed;
      top: 64px;
      left: 14px;
      right: 14px;
      /* Above the Beta pill (which tucks under the logo) so it isn't clipped,
         but below the app-switcher dropdown so the menu stays usable. */
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 18px;
      background: linear-gradient(135deg, rgba(139, 99, 255, 0.95), rgba(106, 62, 224, 0.95));
      border-radius: 14px;
      color: white;
      font-size: 16px;
      line-height: 1.3;
      text-decoration: none;
      backdrop-filter: blur(10px);
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.35);
    }

    #ios-cta.visible {
      display: flex;
    }

    #ios-cta strong {
      font-weight: 700;
    }

    #ios-cta .dismiss {
      background: rgba(255, 255, 255, 0.18);
      border: none;
      color: rgba(255, 255, 255, 0.9);
      font-size: 16px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
      cursor: pointer;
      line-height: 1;
    }

    /* Desktop-only iOS app strip layered above the landing page */
    #desktop-ios-strip {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      display: none;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      font-size: 14px;
      backdrop-filter: blur(10px);
    }

    #desktop-ios-strip.visible {
      display: flex;
    }

    #desktop-ios-strip a {
      color: #b195ff;
      font-weight: 600;
      text-decoration: underline;
    }

    /* Object Picker UI - bottom left */
    #object-picker {
      position: fixed;
      bottom: 40px;
      left: 10px;
      z-index: 100;
      display: flex;
      flex-direction: column-reverse;
      gap: 6px;
    }

    .picker-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .picker-toggle:active {
      background: rgba(0, 0, 0, 0.8);
    }

    .picker-menu {
      display: none;
      flex-direction: column;
      gap: 3px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 10px;
      padding: 6px;
      backdrop-filter: blur(10px);
    }

    .picker-menu.open {
      display: flex;
    }

    .picker-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 11px;
      cursor: pointer;
      text-align: left;
    }

    .picker-item:active,
    .picker-item.selected {
      background: rgba(59, 130, 246, 0.5);
    }

    .picker-hint {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 20px;
      color: white;
      font-size: 14px;
      backdrop-filter: blur(10px);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }

    .picker-hint.visible {
      opacity: 1;
    }

    .picker-arrow {
      font-size: 12px;
      opacity: 0.7;
      margin-left: 4px;
    }

    /* Auth button container */
    #auth-root {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 100;
    }

    /* Camera button container */
    #camera-container {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: none;
    }

    #camera-container.visible {
      display: block;
    }

    /* Ensure xrextras capture preview/share dialog appears above our UI */
    /* The xrextras previewContainer has z-index: 30 by default, but our UI uses z-index: 100 */
    #previewContainer {
      z-index: 1000 !important;
    }

    /* Gallery overrides for Bollard Buddy */
    /* Position gallery toggle in lower-right corner next to shutter */
    #assets-toggle {
      top: auto !important;
      bottom: 40px !important;
      right: 10px !important;
      left: auto !important;
      z-index: 150 !important;
      width: 50px !important;
      height: 50px !important;
      display: flex !important;
      pointer-events: auto !important;
    }

    /* Position gallery sidebar from bottom-right, full height */
    #assets-container {
      top: 0 !important;
      bottom: 100px !important;
      right: 0 !important;
      width: 66vw !important;
      height: auto !important;
      max-height: none !important;
      z-index: 100 !important;
    }

    /* Ensure gallery modal appears above everything */
    #assets-root > div[class*="modal"] {
      z-index: 2000 !important;
    }
  </style>
</head>
<body>
  <!-- Object Picker UI -->
  <div id="object-picker">
    <button class="picker-toggle" id="picker-toggle">
      <span id="picker-icon">🚧</span>
      <span id="picker-label">Bollard</span>
      <span class="picker-arrow">▼</span>
    </button>
    <div class="picker-menu" id="picker-menu">
      <button class="picker-item selected" data-model="bollard" data-icon="🚧" data-label="Bollard">
        <span>🚧</span> Bollard
      </button>
      <button class="picker-item" data-model="cone" data-icon="🔶" data-label="Cone">
        <span>🔶</span> Cone
      </button>
      <button class="picker-item" data-model="safehit" data-icon="🛡️" data-label="SafeHit">
        <span>🛡️</span> SafeHit
      </button>
    </div>
  </div>
  <div class="picker-hint" id="picker-hint">Tap on ground to place</div>

  <!-- App Switcher Mount Point (upper-left) -->
  <div id="app-switcher-root"></div>
  <div id="beta-pill">WebXR Beta</div>

  <!-- iOS app CTA (iPhone/iPad only; best experience is the native app).
       Links straight to the App Store, not the marketing landing page. -->
  <a id="ios-cta" href="https://apps.apple.com/us/app/bollard-buddy/id6756771127" target="_blank" rel="noopener">
    <span>📱 <strong>Best on iOS:</strong> Get the app</span>
    <button class="dismiss" id="ios-cta-dismiss" aria-label="Dismiss">✕</button>
  </a>

  <!-- Desktop strip layered above the landing page QR fallback -->
  <div id="desktop-ios-strip">
    <span>📱 Bollard Buddy is best on iPhone.</span>
    <a href="https://apps.apple.com/us/app/bollard-buddy/id6756771127" target="_blank" rel="noopener">get the iOS app</a>
    <span>or scan the QR code above to use the web version.</span>
  </div>

  <!-- React Auth Island Mount Point -->
  <div id="auth-root"></div>

  <!-- Camera button container (button added dynamically once tracking is ready) -->
  <div id="camera-container"></div>

  <!-- 8th Wall open distribution (no app key / domain authorization required).
       8frame is 8th Wall's A-Frame build; no npm package exists so it is vendored locally.
       Engine binary, XRExtras and Landing Page are official @8thwall npm releases. -->
  <script src="/bollardbuddy/scripts/8frame-1.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>

  <!-- Object Picker Logic -->
  <script>
    // Pre-select bollard
    window.selectedModel = 'bollard';

    const pickerToggle = document.getElementById('picker-toggle');
    const pickerMenu = document.getElementById('picker-menu');
    const pickerIcon = document.getElementById('picker-icon');
    const pickerLabel = document.getElementById('picker-label');
    const pickerHint = document.getElementById('picker-hint');
    const pickerItems = document.querySelectorAll('.picker-item');

    pickerToggle.addEventListener('click', () => {
      pickerMenu.classList.toggle('open');
    });

    pickerItems.forEach(item => {
      item.addEventListener('click', () => {
        const model = item.dataset.model;
        const icon = item.dataset.icon;
        const label = item.dataset.label;

        // Toggle selection
        if (window.selectedModel === model) {
          window.selectedModel = null;
          pickerIcon.textContent = '+';
          pickerLabel.textContent = 'Select Object';
          pickerHint.classList.remove('visible');
          pickerItems.forEach(i => i.classList.remove('selected'));
        } else {
          window.selectedModel = model;
          pickerIcon.textContent = icon;
          pickerLabel.textContent = label;
          pickerHint.classList.add('visible');
          pickerItems.forEach(i => i.classList.remove('selected'));
          item.classList.add('selected');
        }

        pickerMenu.classList.remove('open');
        console.log('Selected model:', window.selectedModel);
      });
    });

    // Close menu when tapping outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#object-picker')) {
        pickerMenu.classList.remove('open');
      }
    });

    // Track state
    window.hasPlacedObject = false;

    const cameraContainer = document.getElementById('camera-container');

    // Show camera button (dynamically create it once AR tracking is running)
    window.showCameraButton = () => {
      if (!window.cameraButtonAdded) {
        window.cameraButtonAdded = true;
        const captureButton = document.createElement('xrextras-capture-button');
        captureButton.setAttribute('capture-mode', 'photo');
        cameraContainer.appendChild(captureButton);
        cameraContainer.classList.add('visible');
        console.log('Camera button added');
      }
    };

    // The open-distribution 8th Wall library has no coaching overlay, so key
    // off `realityready` (emitted on the scene when the camera + tracking are
    // up) to reveal the shutter button and the placement hint.
    const onRealityReady = () => {
      if (window.selectedModel && !window.hasPlacedObject) {
        pickerHint.classList.add('visible');
      }
      window.showCameraButton();
    };

    const initRealityListeners = () => {
      const scene = document.querySelector('a-scene');
      if (scene) {
        scene.addEventListener('realityready', onRealityReady, { once: true });
      } else {
        setTimeout(initRealityListeners, 100);
      }
    };
    initRealityListeners();

    // Device-targeted CTAs: iOS users get a "native app is better" pill;
    // desktop users get a strip under the landing page QR fallback.
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isMobile = isIOS || /Android|Mobi/i.test(navigator.userAgent);

    if (isIOS) {
      const iosCta = document.getElementById('ios-cta');
      iosCta.classList.add('visible');
      document.getElementById('ios-cta-dismiss').addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        iosCta.classList.remove('visible');
      });
    } else if (!isMobile) {
      document.getElementById('desktop-ios-strip').classList.add('visible');
    }
  </script>

  <!-- tap-place component -->
  <script>
    AFRAME.registerComponent('tap-place', {
      init() {
        const ground = document.getElementById('ground');

        const modelMap = {
          bollard: '#model-bollard',
          cone: '#model-cone',
          safehit: '#model-safehit',
        };

        ground.addEventListener('click', (event) => {
          const selectedModel = window.selectedModel;
          if (!selectedModel) {
            console.log('No model selected');
            return;
          }

          const modelSrc = modelMap[selectedModel];
          if (!modelSrc) {
            console.error('Unknown model:', selectedModel);
            return;
          }

          console.log('Ground clicked, placing:', selectedModel);

          const touchPoint = event.detail.intersection.point;
          console.log('Touch point:', touchPoint.x, touchPoint.y, touchPoint.z);

          const newElement = document.createElement('a-entity');
          newElement.setAttribute('position', `${touchPoint.x} ${touchPoint.y} ${touchPoint.z}`);
          newElement.setAttribute('scale', '1 1 1');
          newElement.setAttribute('gltf-model', modelSrc);
          newElement.setAttribute('class', 'cantap');
          newElement.setAttribute('shadow', 'cast: true; receive: false');
          newElement.setAttribute('xrextras-hold-drag', '');
          newElement.setAttribute('xrextras-two-finger-rotate', '');

          this.el.sceneEl.appendChild(newElement);
          console.log('Entity added to scene');

          // Hide hint after first placement
          if (!window.hasPlacedObject) {
            window.hasPlacedObject = true;
            const hint = document.getElementById('picker-hint');
            if (hint) hint.classList.remove('visible');
          }

          newElement.addEventListener('model-loaded', () => {
            console.log('Model loaded successfully!');
          });

          newElement.addEventListener('model-error', (err) => {
            console.error('Model failed to load:', err);
          });
        });

        console.log('tap-place component initialized');
      }
    });
  </script>

  <!-- A-Frame Scene -->
  <a-scene
    tap-place
    landing-page="logoSrc: /ui_assets/logo-bollard-buddy-text-rect.png; logoAlt: Bollard Buddy; promptPrefix: Scan or visit; promptSuffix: on your phone to continue"
    xrextras-loading
    xrextras-runtime-error
    xrextras-gesture-detector
    renderer="colorManagement: true"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.7/"
    xrweb="allowedDevices: mobile; scale: absolute">

    <a-assets>
      <a-asset-item id="model-bollard" src="https://assets.3dstreet.app/sets/dividers/gltf-exports/draco/dividers-bollard.glb"></a-asset-item>
      <a-asset-item id="model-cone" src="https://assets.3dstreet.app/sets/dividers/gltf-exports/draco/dividers-traffic-cone.glb"></a-asset-item>
      <a-asset-item id="model-safehit" src="https://assets.3dstreet.app/sets/dividers/gltf-exports/draco/dividers-safehit.glb"></a-asset-item>
    </a-assets>

    <a-camera
      id="camera"
      position="0 1.6 0"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <a-entity
      light="type: directional; intensity: 1; castShadow: true; shadowMapHeight: 2048; shadowMapWidth: 2048"
      position="1 4.3 2.5">
    </a-entity>
    <a-entity light="type: ambient; intensity: 0.7"></a-entity>

    <a-box
      id="ground"
      class="cantap"
      scale="1000 2 1000"
      position="0 -1 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      shadow>
    </a-box>

    <!-- Photo capture config and preview -->
    <xrextras-capture-config
      file-name-prefix="bollardbuddy-web-"
      request-mic="false"
    ></xrextras-capture-config>
    <xrextras-capture-preview></xrextras-capture-preview>

  </a-scene>

  <!-- Load the bundled JavaScript for React auth island -->
  <script src="/dist/bollardbuddy.js"></script>
</body>
</html>
