name: i18n

# Keeps the translation catalogs (es, pt-BR, fr) in sync with the English
# source of truth (#656). On PRs it only verifies there is no drift. On pushes
# to main it re-extracts, translates any new/changed keys with an LLM, and
# opens a PR with the updated catalogs (main is protected, so the bot cannot
# push to it directly) so locales never go stale.

on:
  push:
    branches:
      - main
    paths:
      - 'src/**/*.js'
      - 'src/**/*.jsx'
      - 'src/editor/i18n/locales/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**/*.js'
      - 'src/**/*.jsx'
      - 'src/editor/i18n/locales/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  i18n:
    name: Check / refresh translations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Extract English source catalog
        run: npm run i18n:extract

      # On PRs: fail if catalogs are out of date so authors run translate locally
      # (or rely on the post-merge job). No API key needed for the check.
      - name: Check for translation drift
        if: github.event_name == 'pull_request'
        run: npm run i18n:check

      # On main: translate any stale keys and open a PR with the refreshed
      # catalogs. main requires PRs, so the bot cannot push to it directly.
      - name: Translate new/changed strings
        if: github.event_name != 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run i18n:translate

      - name: Open PR with refreshed catalogs
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -z "$(git status --porcelain src/editor/i18n/locales)" ]]; then
            echo "Catalogs already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="i18n/refresh-catalogs"
          git checkout -B "$BRANCH"
          git add src/editor/i18n/locales
          git commit --no-verify -m "chore(i18n): refresh translation catalogs"
          git push --force origin "$BRANCH"
          if [[ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')" ]]; then
            gh pr create --head "$BRANCH" \
              --title "chore(i18n): refresh translation catalogs" \
              --body "Automated translation refresh for strings added or changed on \`main\`. Generated by the i18n workflow."
          else
            echo "Existing refresh PR updated."
          fi
